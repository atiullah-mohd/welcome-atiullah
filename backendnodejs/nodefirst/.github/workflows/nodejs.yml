name: Node.js CI (Windows)

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: windows-latest   # 👈 Windows use ho raha hai

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install dependencies
        run: npm install

      - name: 🧪 Run tests
        run: npm test || echo No tests found

      - name: ▶️ Run app
        run: node index.js